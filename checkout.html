<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
}

.container{
width:400px;
margin:50px auto;
background:#222;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#f5c542;
border:none;
border-radius:5px;
cursor:pointer;
font-size:18px;
}
</style>

</head>

<body>

<div class="container">

<h2>Checkout</h2>

<input type="text" placeholder="Full Name">

<input type="text" placeholder="Mobile Number">

<input type="text" placeholder="Address">

<input type="text" placeholder="City">

<button onclick="order()">Place Order</button>

</div>

<script>
function order(){
window.location.href="success.html";
}
</script>

</body>
</html>
