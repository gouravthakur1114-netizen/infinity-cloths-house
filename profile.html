<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<style>
body{
    margin:0;
    background:#111;
    font-family:Arial,sans-serif;
    color:white;
}

.profile{
    width:400px;
    margin:60px auto;
    background:#222;
    padding:30px;
    border-radius:15px;
    text-align:center;
}

.profile img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid #f5c542;
    object-fit:cover;
}

.profile h2{
    margin-top:15px;
}

.profile p{
    color:#ccc;
}

.profile button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#f5c542;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="profile">

<img src="profile.jpg" alt="Profile">

<h2>Gourav</h2>

<p>gourav@email.com</p>

<p>Member Since 2026</p>

<button onclick="window.location.href='index.html'">
Back To Home
</button>

</div>

</body>
</html>
