<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup - Infinity Cloths House</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:400px;
background:#222;
padding:30px;
border-radius:15px;
color:white;
box-shadow:0 0 20px rgba(255,255,255,.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#f5c542;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:white;
}

a{
color:#f5c542;
text-decoration:none;
}

p{
margin-top:15px;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Account</h2>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<input type="password" placeholder="Confirm Password">

<button onclick="signup()">
Create Account
</button>

<p>
Already have an account?

<a href="login.html">
Login
</a>

</p>

</div>

<script>

function signup(){

alert("Account Created Successfully ❤️");

window.location.href="login.html";

}

</script>

</body>
</html>
